databases: []

services:
  - type: web
    name: makuup-backend
    runtime: python
    rootDir: backend
    buildCommand: pip install -r requirements.txt && python manage.py collectstatic --noinput
    startCommand: gunicorn makuup.wsgi:application --bind 0.0.0.0:$PORT --workers 2 --timeout 120
    envVars:
      - key: DJANGO_SETTINGS_MODULE
        value: makuup.settings.prod
      - key: PYTHON_VERSION
        value: "3.12.0"
